name: Interactive Research Shell

on: 
  workflow_dispatch:

jobs:
  interactive-research:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Install SSH Server & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl iproute2 nano net-tools
      - name: 2. Configure SSH
        env:
          ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD || 'my-secret-password-123' }}
        run: |
          sudo mkdir -p /var/run/sshd
          echo "root:$ROOT_PASSWORD" | sudo chpasswd
          
          # Clean configuration: Enable Root Login and Password Auth
          sudo sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          # Restart SSH Service
          sudo service ssh restart
      - name: 3. Install Ngrok
        env:
          # IMPORTANT: Use a GitHub Secret for this!
          NGROK_AUTHTOKEN: '3B4bJ5DEqpLbNjUbHv8fsvaSHAJ_2xkR3pXLcUR37wzsQPN4G'
        run: |
          if [ -z "$NGROK_AUTHTOKEN" ]; then
            echo "ERROR: NGROK_AUTHTOKEN secret is missing! Add it to Repo Secrets."
            exit 1
          fi
          curl -s https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xvzf ngrok.tgz
          chmod +x ngrok
          ./ngrok config add-authtoken $NGROK_AUTHTOKEN
      - name: 4. Start Tunnel & Print Connection Info
        env:
          ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD || 'my-secret-password-123' }}
        run: |
          # Start ngrok in background
          nohup ./ngrok tcp 22 --log=stdout > ngrok.log 2>&1 &
          
          echo "Starting ngrok... waiting 10s for initialization"
          sleep 10
          
          # Attempt to get the URL. We use "|| true" to prevent the script from 
          # crashing if grep doesn't find a match immediately.
          RAW_API_RESPONSE=$(curl -s http://localhost:4040/api/tunnels)
          TCP_URL=$(echo $RAW_API_RESPONSE | jq -r '.tunnels[0].public_url // empty')
          
          echo "=========================================================="
          if [ -z "$TCP_URL" ]; then
             echo "ERROR: Could not get Tunnel URL."
             echo "Raw API Response: $RAW_API_RESPONSE"
             echo "Printing last 10 lines of ngrok.log:"
             tail -n 10 ngrok.log
             exit 1
          else
             echo "   YOUR SSH CONNECTION STRING IS BELOW:"
             echo "=========================================================="
             HOST=$(echo $TCP_URL | sed 's/tcp:\/\///' | cut -d: -f1)
             PORT=$(echo $TCP_URL | sed 's/tcp:\/\///' | cut -d: -f2)
             echo "ssh root@$HOST -p $PORT"
             echo "=========================================================="
             echo "   Password: $ROOT_PASSWORD"
          fi
          echo "=========================================================="
      - name: 5. Keepalive Loop (Runs for 6 hours max)
        run: |
          echo "Keep-alive started. Use 'touch /tmp/keepalive' to keep it running."
          # GitHub Actions timeout is usually 6 hours
          for i in {1..360}; do
            echo "Job is alive... [Minute $i/360] Waiting for researcher..."
            sleep 60
          done
