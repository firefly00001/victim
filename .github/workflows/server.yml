name: Interactive Research Shell v2

on: 
  workflow_dispatch:

jobs:
  interactive-research:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: 1. Install SSH Server & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl iproute2 nano net-tools nmap dnsutils jq

      - name: 2. Configure SSH
        env:
          ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD || 'research-shell-2026' }}
        run: |
          sudo mkdir -p /var/run/sshd
          echo "root:$ROOT_PASSWORD" | sudo chpasswd
          
          sudo sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "GatewayPorts yes" | sudo tee -a /etc/ssh/sshd_config
          
          sudo service ssh restart
          echo "[+] SSH server running on port 22"

      - name: 3. Install Tunnel Tools
        run: |
          # === Option A: Cloudflared (Cloudflare Tunnel - free, no account needed) ===
          echo "[*] Installing cloudflared..."
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          
          # === Option B: Bore (simple TCP tunnel - no account needed) ===
          echo "[*] Installing bore..."
          BORE_URL=$(curl -s https://api.github.com/repos/ekzhang/bore/releases/latest | grep -oP '"browser_download_url":\s*"\K[^"]*x86_64-unknown-linux-musl\.tar\.gz')
          echo "  Bore URL: $BORE_URL"
          curl -sL "$BORE_URL" -o bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/bore
          
          # === Option C: Chisel (TCP tunnel over HTTP) ===
          echo "[*] Installing chisel..."
          CHISEL_URL=$(curl -s https://api.github.com/repos/jpillora/chisel/releases/latest | grep -oP '"browser_download_url":\s*"\K[^"]*linux_amd64\.gz')
          echo "  Chisel URL: $CHISEL_URL"
          curl -sL "$CHISEL_URL" | gunzip > /usr/local/bin/chisel
          chmod +x /usr/local/bin/chisel
          
          echo "[+] All tunnel tools installed"

      - name: 4. Start Tunnels & Print Connection Info
        env:
          ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD || 'research-shell-2026' }}
        run: |
          echo "=========================================================="
          echo "   STARTING TUNNELS..."
          echo "=========================================================="
          
          # --- Tunnel A: Cloudflared (recommended - most reliable) ---
          echo ""
          echo "[*] Starting Cloudflared tunnel..."
          nohup cloudflared tunnel --url tcp://localhost:22 --no-autoupdate > /tmp/cloudflared.log 2>&1 &
          CFLARED_PID=$!
          sleep 8
          
          # Cloudflared prints the URL to stderr/log
          CF_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cloudflared.log | head -1 || true)
          
          if [ -n "$CF_URL" ]; then
            echo "=========================================================="
            echo "   ✅ CLOUDFLARED TUNNEL (TCP over HTTPS)"
            echo "=========================================================="
            echo ""
            echo "   On your LOCAL machine, first run:"
            echo "   cloudflared access tcp --hostname $CF_URL --url localhost:2222"
            echo ""
            echo "   Then connect:"
            echo "   ssh root@localhost -p 2222"
            echo ""
            echo "   Password: $ROOT_PASSWORD"
            echo "=========================================================="
          else
            echo "[!] Cloudflared failed to start. Log:"
            cat /tmp/cloudflared.log | tail -20
            echo ""
          fi
          
          # --- Tunnel B: Bore (simple TCP, public server) ---
          echo ""
          echo "[*] Starting Bore tunnel..."
          nohup bore local 22 --to bore.pub > /tmp/bore.log 2>&1 &
          BORE_PID=$!
          sleep 5
          
          BORE_PORT=$(grep -oP 'listening at bore\.pub:\K[0-9]+' /tmp/bore.log | head -1 || true)
          
          if [ -n "$BORE_PORT" ]; then
            echo "=========================================================="
            echo "   ✅ BORE TUNNEL (direct TCP)"
            echo "=========================================================="
            echo ""
            echo "   ssh root@bore.pub -p $BORE_PORT"
            echo ""
            echo "   Password: $ROOT_PASSWORD"
            echo "=========================================================="
          else
            echo "[!] Bore failed. Log:"
            cat /tmp/bore.log | tail -10
            echo ""
          fi
          
          # --- Summary ---
          echo ""
          echo "=========================================================="
          echo "   📋 SUMMARY"
          echo "=========================================================="
          echo "   Password for all methods: $ROOT_PASSWORD"
          echo ""
          echo "   Runner IP: $(curl -s ifconfig.me)"
          echo "   Internal IP: $(hostname -I | awk '{print $1}')"
          echo "   Hostname: $(hostname)"
          echo "=========================================================="
          
          # Save connection info for the keepalive step
          echo "$CF_URL" > /tmp/cf_url.txt
          echo "$BORE_PORT" > /tmp/bore_port.txt

      - name: 5. Keepalive Loop (6 hours max)
        env:
          ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD || 'research-shell-2026' }}
        run: |
          echo "[*] Keep-alive started at $(date)"
          echo "[*] Session will run for up to 6 hours"
          echo "[*] Create /tmp/stop to end early"
          echo ""
          
          for i in $(seq 1 360); do
            # Check if user wants to stop
            if [ -f /tmp/stop ]; then
              echo "[*] Stop file found. Shutting down."
              break
            fi
            
            # Print status every 5 minutes
            if [ $((i % 5)) -eq 0 ]; then
              echo "[Minute $i/360] Alive at $(date) | SSH sessions: $(who | wc -l) | Load: $(uptime | awk -F'load average:' '{print $2}')"
              
              # Reprint connection info every 30 min in case logs scroll
              if [ $((i % 30)) -eq 0 ]; then
                CF_URL=$(cat /tmp/cf_url.txt 2>/dev/null)
                BORE_PORT=$(cat /tmp/bore_port.txt 2>/dev/null)
                echo "  → Cloudflared: $CF_URL"
                echo "  → Bore: ssh root@bore.pub -p $BORE_PORT"
                echo "  → Password: $ROOT_PASSWORD"
              fi
            fi
            
            sleep 60
          done
          
          echo "[*] Session ended at $(date)"
